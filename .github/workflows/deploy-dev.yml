name: Deploy Dev

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy app files to Dev VM
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -r app/ Dockerfile .dockerignore docker-compose.yml ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}:/opt/app/

      - name: Deploy Flask container
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} "cd /opt/app && export DEPLOY_TIME=\"$(date -u +'%Y-%m-%d %H:%M:%S UTC')\" && export GITHUB_SHA=\"${{ github.sha }}\" && export GITHUB_REF_NAME=\"${{ github.ref_name }}\" && sudo docker compose down --remove-orphans && sudo DEPLOY_TIME=\"$DEPLOY_TIME\" GITHUB_SHA=\"$GITHUB_SHA\" GITHUB_REF_NAME=\"$GITHUB_REF_NAME\" docker compose up -d --build && sudo docker compose ps"

      - name: Smoke test
        run: |
          sleep 4
          curl -f "http://${{ secrets.DEV_HOST }}:5000/health"
