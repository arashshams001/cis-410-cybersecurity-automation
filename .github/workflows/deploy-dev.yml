name: "Setup — Dev Server"

on:

  workflow_dispatch:   # Manual trigger only — no automatic runs

jobs:

  setup:

    name: "Install Docker on Dev VM"

    runs-on: self-hosted

    steps:

      # ── Step 1: Configure passwordless sudo ────────────────────────────────

      # Pipeline SSH sessions are non-interactive — there is no terminal to

      # type a password into. sudo -S reads the password from stdin instead.

      # SUDO_PASS is stored as a GitHub Secret and never written to disk.

      # After this step, all subsequent sudo commands run without a password.

      # The guard checks if passwordless sudo is already configured so this

      # step is safe to re-run.

      - name: Configure passwordless sudo

        run: |

          echo "${{ secrets.DEV_SSH_KEY }}" > /tmp/deploy_key

          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \

            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} \

            "set -e

            if sudo -n true 2>/dev/null; then

              echo '=== Passwordless sudo already configured — skipping ==='

            else

              echo '=== Configuring passwordless sudo ==='

              echo '${{ secrets.SUDO_PASS }}' | sudo -S bash -c \

                'echo \"${{ secrets.DEV_USER }} ALL=(ALL) NOPASSWD:ALL\" > /etc/sudoers.d/${{ secrets.DEV_USER }} && chmod 0440 /etc/sudoers.d/${{ secrets.DEV_USER }}'

              echo '=== Passwordless sudo configured ==='

            fi"

          rm /tmp/deploy_key

