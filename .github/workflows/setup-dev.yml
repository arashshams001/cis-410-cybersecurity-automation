name: Setup Dev Server

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  setup-dev:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEV_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=yes -i ~/.ssh/id_ed25519 ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} "hostname && whoami"

      - name: Prepare app directory on dev
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} "mkdir -p ~/app"

      - name: Copy files to dev
        run: |
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519" ./ ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}:~/app/

      - name: Test Docker on dev
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} "docker ps"
