name: Setup Dev Server

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  setup-dev:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_SSH_KEY }}

      - name: Add dev host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEV_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} "hostname && whoami"

      - name: Prepare app directory on dev
        run: |
          ssh ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} "mkdir -p ~/app"

      - name: Copy files to dev
        run: |
          rsync -avz --delete ./ ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}:~/app/

      - name: Test Docker on dev
        run: |
          ssh ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} "docker ps"
